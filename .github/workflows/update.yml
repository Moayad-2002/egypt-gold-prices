name: Auto Update Gold Prices

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4 lxml pandas

      - name: Run fetch script
        run: python scripts/fetch_prices.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit and push prices.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/prices.json
          git diff --cached --quiet && echo "No changes, skipping commit" || (
            git commit -m "🔄 Auto-update prices [$(date -u '+%Y-%m-%d %H:%M')] UTC" &&
            git push
          )
